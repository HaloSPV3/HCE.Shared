name: CodeQL Analysis

on:
  push:
  pull_request:
    types: [opened, reopened, ready_for_review]
  schedule:
    - cron: '0 0 * * *'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp', 'javascript']

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - run: corepack enable # enable corepack before setup-node
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - run: corepack enable # enable corepack AFTER setup-node
      - name: Setup Node Cache
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: corepack enable # Assure it's enabled

      - run: yarn install --immutable

      - uses: actions/setup-dotnet@v6.0.0

      - uses: fast-actions/setup-dotnet@v1
        with:
          runtime-version: '6.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          # config-file: 'lgtm.yml'
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
