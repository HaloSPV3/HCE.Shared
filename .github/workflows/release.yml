name: Release
on:
  workflow_dispatch:
  push:
    branches: [main, develop, 3.x]

jobs:
  npm-checks:
    uses: ./.github/workflows/npm-ci-and-pack.yml
    permissions:
      id-token: write # to enable use of OIDC for npm provenance; Upload coverage reports to Codecov
      packages: write # required for pushing dummy packages in test suite
      contents: read # access to check out code and install dependencies
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GL_TOKEN: ${{ secrets.GL_SEMANTICRELEASE }}
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
  npm-release:
    runs-on: ubuntu-latest
    needs: npm-checks
    permissions:
      contents: write # to be able to publish a GitHub release
      id-token: write # to enable use of OIDC for npm provenance and Trusted Publishing
      issues: write # to be able to comment on released issues
      packages: write
      pull-requests: write # to be able to comment on released pull requests
    env:
      DOTNET_NOLOGO: true
      # https://stackoverflow.com/questions/75180149/how-to-cache-dotnet-installation-in-github-actions
      # access to "usr/lib/dotnet" is denied
      DOTNET_INSTALL_DIR: /usr/share/dotnet
      DOTNET_ROOT: /usr/share/dotnet

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - run: corepack enable # enable corepack before setup-node
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - run: corepack enable # enable corepack AFTER setup-node
      - name: Setup Node Cache
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: corepack enable # Assure it's enabled

      - uses: actions/setup-dotnet@v6.0.0
        with:
          # required by Kuinox.NupkgDeterministicator
          dotnet-version: 6.x
          global-json-file: ./global.json

      # ensure GitLab is synced _before_ releasing
      - name: Sync to GitLab
        uses: kujov/gitlab-sync@2.2.1
        with:
          gitlab_url: https://gitlab.com/halospv3/HCE.Shared
          username: BinToss
          gitlab_pat: ${{ secrets.GL_SEMANTICRELEASE }}
      - name: List commits since last tag
        run: git log $(git describe --tags --abbrev=0)..HEAD --no-merges --oneline
      - run: yarn install --immutable
      # Waiting for https://github.com/yarnpkg/berry/issues/6487
      #- run: npm audit signatures

      - uses: NuGet/login@v1
        id: nuget-login
        with:
          user: nToss

      - run: yarn semantic-release --debug # make git tag, commit updated files, release to GitHub/GitLab.
        id: semantic-release
        # outputs:
        #  - new-release-published
        #  - new-release-version
        #  - new-release-git-tag
        env:
          DEBUG: semantic-release*
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GL_TOKEN: ${{ secrets.GL_SEMANTICRELEASE }}
          NUGET_TOKEN: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
